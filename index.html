<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>笔画 & 生字练习</title>
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
    <style>
        :root {
            --primary-color: #4CAF50; /* 森林綠 */
            --accent-color: #FFEB3B;  /* 活力黃 */
            --bg-color: #E8F5E9;      /* 淺綠背景 */
        }
        body {
            font-family: "Microsoft YaHei", "SimHei", sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #333;
        }
        /* 標題區設計 */
        .app-header {
            background: linear-gradient(135deg, #4CAF50 0%, #2E7D32 100%);
            color: white;
            width: 100%;
            padding: 30px 0;
            text-align: center;
            border-bottom-left-radius: 50px;
            border-bottom-right-radius: 50px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .app-header h1 { margin: 0; font-size: 2.2rem; letter-spacing: 2px; }
        
        /* 核心內容區 */
        .main-card {
            background: white;
            width: 90%;
            max-width: 700px;
            margin: -30px 20px 20px 20px;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        /* 輸入區 */
        .input-section {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
        }
        input[type="text"] {
            flex: 1;
            border: 3px solid #C8E6C9;
            border-radius: 15px;
            padding: 15px;
            font-size: 1.1rem;
            outline: none;
        }
        input:focus { border-color: var(--primary-color); }
        .btn-create {
            background-color: #FF9800;
            color: white;
            border: none;
            padding: 0 25px;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn-create:hover { transform: scale(1.05); }

        /* 字幕按鈕區 */
        #charButtons {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
        }
        .char-bubble {
            width: 65px;
            height: 65px;
            border: 4px solid #FFCC80;
            background-color: white;
            border-radius: 50%;
            font-size: 28px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 0 #FFB74D;
        }
        .char-bubble:active { transform: translateY(4px); box-shadow: none; }
        .char-bubble.active {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--accent-color);
        }

        /* 練習區畫布 */
        .practice-zone {
            display: none;
            flex-direction: column;
            align-items: center;
            border: 5px dashed #A5D6A7;
            border-radius: 20px;
            padding: 20px;
            background-color: #FAFAFA;
        }
        #character-target {
            width: 280px;
            height: 280px;
            background-color: white;
            border: 2px solid #333;
            /* 米字格背景 */
            background-image: 
                linear-gradient(45deg, transparent 49%, #eee 49%, #eee 51%, transparent 51%),
                linear-gradient(-45deg, transparent 49%, #eee 49%, #eee 51%, transparent 51%),
                linear-gradient(to right, transparent 49%, #eee 49%, #eee 51%, transparent 51%),
                linear-gradient(to bottom, transparent 49%, #eee 49%, #eee 51%, transparent 51%);
        }
        .status-msg {
            margin-top: 15px;
            font-size: 1.2rem;
            color: #2E7D32;
            font-weight: bold;
            min-height: 1.5em;
        }
    </style>
</head>
<body>

    <div class="app-header">
        <h1>笔画 & 生字练习</h1>
        <p>听一听、看一看、写一写</p>
    </div>

    <div class="main-card">
        <div class="input-section">
            <input type="text" id="charInput" placeholder="输入你想练习的生字...">
            <button class="btn-create" id="generateBtn">生成按钮</button>
        </div>

        <div id="charButtons"></div>

        <div class="practice-zone" id="practiceZone">
            <div id="character-target"></div>
            <div class="status-msg" id="statusMsg">准备好了吗？</div>
        </div>
    </div>

    <script>
        let writer;

        document.getElementById('generateBtn').addEventListener('click', function() {
            const text = document.getElementById('charInput').value;
            const container = document.getElementById('charButtons');
            container.innerHTML = '';
            document.getElementById('practiceZone').style.display = 'none';

            // 確保只處理簡體中文 (Hanzi Writer 自動處理大部分簡體字庫)
            Array.from(text).forEach(char => {
                if (char.trim() === '') return;
                const btn = document.createElement('div');
                btn.className = 'char-bubble';
                btn.textContent = char;
                btn.onclick = () => startAutoFlow(char, btn);
                container.appendChild(btn);
            });
        });

        // 自動化流程控制
        async function startAutoFlow(char, btnElement) {
            // 1. 介面更新
            document.querySelectorAll('.char-bubble').forEach(b => b.classList.remove('active'));
            btnElement.classList.add('active');
            document.getElementById('practiceZone').style.display = 'flex';
            
            // 2. 初始化畫布 (簡體中文模式)
            const status = document.getElementById('statusMsg');
            document.getElementById('character-target').innerHTML = '';
            
            writer = HanziWriter.create('character-target', char, {
                width: 280,
                height: 280,
                padding: 10,
                showOutline: true,
                strokeColor: '#2E7D32',
                outlineColor: '#EEEEEE',
                drawingColor: '#D32F2F', // 孩子練習時的筆畫顏色
                drawingWidth: 15
            });

            // 3. 標準華文讀音 (TTS)
            status.textContent = "🔊 正在朗读...";
            await speak(char);

            // 4. 自動寫筆畫
            status.textContent = "👀 仔细看笔顺...";
            await new Promise(resolve => {
                writer.animateCharacter({ onComplete: resolve });
            });

            // 5. 自動進入練習模式
            status.textContent = "✍️ 现在輪到你写写看！";
            writer.quiz({
                onComplete: () => {
                    status.textContent = "🌟 太棒了！你學會了！";
                }
            });
        }

        // 語音朗讀函式
        function speak(text) {
            return new Promise((resolve) => {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-CN'; // 設定為簡體中文/標準華語語音
                utterance.rate = 0.8;    // 稍微慢一點點，讓孩子聽清楚
                utterance.onend = resolve;
                window.speechSynthesis.speak(utterance);
            });
        }
    </script>
</body>
</html>
