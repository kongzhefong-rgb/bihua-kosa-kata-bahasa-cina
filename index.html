<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>笔画&生字练习</title>
    <!-- 引入 Hanzi Writer -->
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary-green: #4CAF50;
            --dark-green: #2E7D32;
            --bg-color: #F8FAF8;
            --grid-color: #ffcccc;
        }

        body {
            font-family: "Microsoft YaHei", sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: linear-gradient(135deg, var(--primary-green) 0%, var(--dark-green) 100%);
            color: white;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 50;
            flex-shrink: 0;
            position: relative;
        }

        .app-body {
            display: flex;
            flex: 1;
            overflow: hidden;
            flex-direction: row;
        }

        /* 左侧边栏 - 文件夹导航 */
        .left-sidebar {
            width: 55px;
            background: #fff;
            border-right: 1px solid #eee;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px 0;
            gap: 12px;
            z-index: 40;
            flex-shrink: 0;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            transition: all 0.3s ease;
            position: relative;
        }

        /* 田字格样式 */
        .hanzi-grid {
            background-color: #fff;
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%;
            border: 3px solid #cc0000;
            position: relative;
            touch-action: none;
            margin: 0 auto;
            max-width: 90vw;
            max-height: 80vh;
        }

        .hanzi-grid::after {
            content: '';
            position: absolute;
            top: 50%; left: 0; right: 0;
            height: 1px; border-top: 1px dashed var(--grid-color);
            pointer-events: none;
        }
        .hanzi-grid::before {
            content: '';
            position: absolute;
            top: 0; bottom: 0; left: 50%;
            width: 1px; border-left: 1px dashed var(--grid-color);
            pointer-events: none;
        }

        .folder-dot {
            width: 42px;
            height: 38px;
            border-radius: 10px;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: bold;
            color: #555;
            transition: all 0.2s;
            border: 1px solid #e0e0e0;
            text-align: center;
        }
        .folder-dot.active {
            background: var(--primary-green);
            color: white;
            border-color: var(--dark-green);
            box-shadow: 0 4px 8px rgba(76,175,80,0.3);
        }

        .word-tag {
            background: white;
            border: 1px solid #ddd;
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 13px;
            color: #444;
            transition: all 0.2s;
        }
        .word-tag.selected {
            border-color: var(--primary-green);
            background: #E8F5E9;
            color: var(--dark-green);
        }

        /* 选字小卡片 */
        .char-box {
            width: 48px;
            height: 48px;
            border: 2px solid #FFCC80;
            border-radius: 10px;
            font-size: 1.4rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            cursor: pointer;
        }
        .char-box.active {
            border-color: #E65100;
            background: #FFF3E0;
        }

        /* 顶部逐字卡片容器 */
        .active-word-container {
            display: none;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            padding: 12px;
            background: #fff;
            border-bottom: 1px solid #f0f0f0;
            width: 100%;
        }

        .compact-view .hide-on-write {
            display: none !important;
        }
        .compact-view .active-word-container {
            display: flex;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* 左上角恢复按钮 */
        .restore-btn {
            position: absolute;
            top: 5px;
            left: 5px;
            background: rgba(0,0,0,0.05);
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #888;
            z-index: 100;
        }
        .restore-btn:hover { color: var(--primary-green); background: rgba(0,0,0,0.1); }

        /* 底部署名样式 */
        .footer {
            text-align: center;
            padding: 6px 0;
            font-size: 10px;
            color: #999;
            background: white;
            border-top: 1px solid #f0f0f0;
            flex-shrink: 0;
        }
    </style>
</head>
<body id="appBody">

    <div class="header">
        <h1 class="text-base font-bold">笔画&生字练习</h1>
        <button onclick="openSettings()" class="bg-white/20 px-3 py-1 rounded-full text-xs font-bold">⚙️ 设置</button>
    </div>

    <div class="app-body">
        <!-- 左侧：文件夹 -->
        <div id="sidebar" class="left-sidebar no-scrollbar"></div>

        <!-- 主练习区 -->
        <div class="main-content no-scrollbar" id="mainContent">
            
            <!-- 恢复箭头 -->
            <div onclick="toggleCompactMode(false)" class="restore-btn hidden" id="restoreHint">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                    <path d="M7 14l5-5 5 5H7z"/>
                </svg>
            </div>

            <!-- 非书写模式：输入与词库 -->
            <div class="p-3 space-y-4 hide-on-write">
                <div class="flex gap-2">
                    <input type="text" id="manualInput" placeholder="手动输入生字或词组练习..." 
                        class="flex-1 px-3 py-2 border rounded-xl text-sm outline-none focus:border-green-400 shadow-sm">
                    <button onclick="handleManual()" class="bg-orange-500 text-white text-sm px-5 rounded-xl font-bold shadow-sm">开始</button>
                </div>

                <div id="wordUnitContainer" class="flex flex-wrap gap-2"></div>
                <div id="charButtons" class="flex flex-wrap gap-2 justify-center p-2 bg-white/50 rounded-xl border-t border-dashed"></div>
            </div>

            <!-- 书写模式：顶部逐字卡片展示 -->
            <div id="activeWordBox" class="active-word-container">
                <!-- 这里会动态生成可点击的字卡 -->
            </div>

            <!-- 练习主区 (居中) -->
            <div id="practiceArea" class="flex-1 flex flex-col items-center justify-center p-4 hidden">
                
                <div id="target" class="hanzi-grid shadow-lg rounded-xl mb-6"></div>
                
                <div class="w-full text-center">
                    <div id="statusText" class="font-bold text-sm text-green-700 mb-4 text-center">请观察笔画演示</div>
                    
                    <div class="flex justify-center gap-4">
                        <button onclick="replayAnimation()" class="bg-blue-500 text-white px-7 py-3 rounded-2xl font-bold text-sm shadow-md flex items-center gap-2 active:scale-95 transition-all">
                            <span>👁️</span> 演示
                        </button>
                        <button onclick="startQuiz()" class="bg-green-600 text-white px-7 py-3 rounded-2xl font-bold text-sm shadow-md flex items-center gap-2 active:scale-95 transition-all">
                            <span>✍️</span> 书写
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 底部署名 -->
    <div class="footer">
        zfkong · 趣学
    </div>

    <!-- 系统设置 -->
    <div id="settingsModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 items-center justify-center hidden p-4">
        <div class="bg-white w-full max-w-sm rounded-3xl shadow-2xl flex flex-col">
            <div class="bg-gray-800 p-4 text-white flex justify-between items-center rounded-t-3xl">
                <h2 class="font-bold text-sm">系统设置</h2>
                <button onclick="closeSettings()">&times;</button>
            </div>
            <div class="p-6 space-y-6">
                <div>
                    <label class="block text-gray-600 font-bold mb-3 text-xs">演示速度 (1.0x 默认)</label>
                    <div class="flex items-center gap-3">
                        <input type="range" id="speedSlider" min="0.2" max="2.0" step="0.2" value="1.0" oninput="updateSpeed(this.value)" class="flex-1 accent-green-600">
                        <span id="speedVal" class="text-green-700 font-bold w-10 text-xs text-center">1.0x</span>
                    </div>
                </div>
                <div class="space-y-3">
                    <h3 class="font-bold text-gray-500 text-xs">文件夹分类</h3>
                    <div class="flex gap-2">
                        <input type="text" id="newFolderName" placeholder="名称" class="flex-1 border p-2 rounded-lg text-xs">
                        <button onclick="addFolder()" class="bg-green-600 text-white px-3 rounded-lg text-xs font-bold">增加</button>
                    </div>
                    <div id="manageList" class="space-y-2 max-h-40 overflow-y-auto no-scrollbar"></div>
                </div>
            </div>
            <div class="p-4 border-t text-center">
                <button onclick="closeSettings()" class="bg-gray-100 px-8 py-2 rounded-xl font-bold text-xs">完成</button>
            </div>
        </div>
    </div>

    <script>
        let writer = null;
        let currentSpeed = 1.0;
        let currentWordString = '';
        let appData = {
            folders: [
                { id: "f4", name: "名字", words: ["江梓宸", "江梓昕"] },
                { id: "f1", name: "1", words: ["幼儿园", "老师", "同学", "学习角落", "课室", "电脑室", "办公室", "游乐场", "厕所", "礼堂", "园长", "校车司机", "园工"] },
                { id: "f2", name: "2", words: ["我", "他", "他们", "大家", "朋友", "打招呼", "牵手", "轮流等待", "互相拥抱", "分享玩具", "玩耍", "玩具", "玩伴"] },
                { id: "f3", name: "3", words: ["爷爷", "奶奶", "爸爸", "妈妈", "哥哥", "姐姐", "弟弟", "妹妹", "种花", "浇花", "看报纸", "洗碗", "洗车", "煮菜", "插花", "洗杯", "看书", "吃饭"] }
            ]
        };

        window.onload = () => {
            const saved = localStorage.getItem('hanzi_mobile_final');
            if (saved) appData = JSON.parse(saved);
            renderSidebar();
        };

        function renderSidebar() {
            const container = document.getElementById('sidebar');
            container.innerHTML = '';
            appData.folders.forEach(f => {
                const btn = document.createElement('button');
                btn.className = "folder-dot";
                btn.textContent = f.name;
                btn.onclick = () => {
                    document.querySelectorAll('.folder-dot').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    toggleCompactMode(false);
                    renderWordUnits(f.words);
                };
                container.appendChild(btn);
            });
        }

        function renderWordUnits(wordsArray) {
            const container = document.getElementById('wordUnitContainer');
            container.innerHTML = '';
            wordsArray.forEach(word => {
                const btn = document.createElement('button');
                btn.className = "word-tag shadow-sm";
                btn.textContent = word;
                btn.onclick = () => {
                    document.querySelectorAll('.word-tag').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    selectWord(word);
                };
                container.appendChild(btn);
            });
        }

        function handleManual() {
            const val = document.getElementById('manualInput').value.trim();
            if(!val) return;
            document.querySelectorAll('.folder-dot').forEach(b => b.classList.remove('active'));
            document.getElementById('wordUnitContainer').innerHTML = '';
            selectWord(val);
        }

        function selectWord(word) {
            currentWordString = word;
            speak(word);
            const container = document.getElementById('charButtons');
            container.innerHTML = '';
            const chars = Array.from(word).filter(c => /\p{Unified_Ideograph}/u.test(c));
            
            chars.forEach(char => {
                const btn = document.createElement('button');
                btn.className = "char-box shadow-sm";
                btn.textContent = char;
                btn.onclick = () => {
                    updateActiveCharInUI(char);
                    speak(char);
                    toggleCompactMode(true, currentWordString);
                    initWriter(char);
                };
                container.appendChild(btn);
            });
            
            if(chars.length > 0) setTimeout(() => container.firstChild.click(), 100);
        }

        function updateActiveCharInUI(char) {
            document.querySelectorAll('.char-box').forEach(b => {
                if(b.textContent === char) b.classList.add('active');
                else b.classList.remove('active');
            });
            document.querySelectorAll('.top-char-card').forEach(b => {
                if(b.textContent === char) b.classList.add('active');
                else b.classList.remove('active');
            });
        }

        function toggleCompactMode(isCompact, fullWord = '') {
            const body = document.getElementById('appBody');
            const restoreHint = document.getElementById('restoreHint');
            const activeWordBox = document.getElementById('activeWordBox');

            if(isCompact) {
                body.classList.add('compact-view');
                restoreHint.classList.remove('hidden');
                
                activeWordBox.innerHTML = '';
                Array.from(fullWord).forEach(char => {
                    if(/\p{Unified_Ideograph}/u.test(char)) {
                        const item = document.createElement('div');
                        item.className = 'char-box shadow-sm top-char-card';
                        item.textContent = char;
                        item.onclick = () => {
                            updateActiveCharInUI(char);
                            speak(char);
                            initWriter(char);
                        };
                        activeWordBox.appendChild(item);
                    }
                });
            } else {
                body.classList.remove('compact-view');
                restoreHint.classList.add('hidden');
                activeWordBox.innerHTML = '';
            }
            if(writer) {
                const size = calculateGridSize();
                writer.updateDimensions({ width: size, height: size });
            }
        }

        function calculateGridSize() {
            const availableWidth = window.innerWidth - 80;
            const availableHeight = window.innerHeight - 250; 
            return Math.min(availableWidth, availableHeight, 380);
        }

        async function initWriter(char) {
            const area = document.getElementById('practiceArea');
            area.classList.remove('hidden');
            document.getElementById('target').innerHTML = '';
            
            const gridSize = calculateGridSize();
            
            writer = HanziWriter.create('target', char, {
                width: gridSize,
                height: gridSize,
                padding: 15,
                showOutline: true,
                strokeColor: '#2E7D32',
                drawingColor: '#E65100',
                drawingWidth: 18,
                strokeAnimationSpeed: currentSpeed,
                delayBetweenStrokes: 1000 / currentSpeed
            });

            updateActiveCharInUI(char);
            replayAnimation();
        }

        function replayAnimation() {
            if (!writer) return;
            writer.cancelQuiz();
            updateStatus("👀 认真观察笔顺...", "text-blue-600");
            writer.animateCharacter({
                onComplete: () => {
                    updateStatus("✍️ 请按照顺序书写", "text-orange-600");
                    startQuiz();
                }
            });
        }

        function startQuiz() {
            if (!writer) return;
            writer.quiz({
                onCorrectStroke: () => updateStatus("✅ 写对了！", "text-green-600"),
                onMistake: () => updateStatus("❌ 笔顺歪了，再试一次", "text-red-500"),
                onComplete: () => updateStatus("🌟 太棒了！写完啦！", "text-blue-700")
            });
        }

        function updateSpeed(val) {
            currentSpeed = parseFloat(val);
            document.getElementById('speedVal').textContent = val + 'x';
            if(writer) {
                writer.updateOptions({ 
                    strokeAnimationSpeed: currentSpeed,
                    delayBetweenStrokes: 1000 / currentSpeed 
                });
            }
        }

        function speak(text) {
            if ('speechSynthesis' in window) {
                speechSynthesis.cancel();
                const msg = new SpeechSynthesisUtterance(text);
                msg.lang = 'zh-CN';
                msg.rate = 0.8;
                speechSynthesis.speak(msg);
            }
        }

        function updateStatus(msg, color) {
            const el = document.getElementById('statusText');
            el.textContent = msg;
            el.className = `font-bold text-sm mb-4 ${color}`;
        }

        window.openSettings = () => {
            if(prompt("密码:") === "0925") {
                document.getElementById('settingsModal').classList.remove('hidden');
                document.getElementById('settingsModal').classList.add('flex');
                renderManageList();
            }
        };

        window.closeSettings = () => {
            document.getElementById('settingsModal').classList.add('hidden');
            localStorage.setItem('hanzi_mobile_final', JSON.stringify(appData));
            renderSidebar();
        };

        function renderManageList() {
            const list = document.getElementById('manageList');
            list.innerHTML = '';
            appData.folders.forEach(f => {
                const div = document.createElement('div');
                div.className = 'p-3 bg-gray-50 rounded-xl border text-[10px]';
                div.innerHTML = `
                    <div class="flex justify-between items-center mb-1">
                        <span class="font-bold">${f.name}</span>
                        <button onclick="deleteFolder('${f.id}')" class="text-red-500">删除</button>
                    </div>
                    <div class="flex gap-1 mb-1">
                        <input type="text" id="addW-${f.id}" placeholder="词词" class="border p-1 rounded flex-1 text-[10px]">
                        <button onclick="addWordToFolder('${f.id}')" class="bg-blue-500 text-white px-2 rounded">加</button>
                    </div>
                    <div class="text-gray-400 truncate">${f.words.join(', ')}</div>
                `;
                list.appendChild(div);
            });
        }

        window.addFolder = () => {
            const name = document.getElementById('newFolderName').value.trim();
            if(!name) return;
            appData.folders.push({ id: 'f'+Date.now(), name, words: [] });
            document.getElementById('newFolderName').value = '';
            renderManageList();
        };

        window.deleteFolder = (id) => {
            appData.folders = appData.folders.filter(f => f.id !== id);
            renderManageList();
        };

        window.addWordToFolder = (id) => {
            const inp = document.getElementById(`addW-${id}`);
            const word = inp.value.trim();
            if(!word) return;
            const folder = appData.folders.find(f => f.id === id);
            if(!folder.words.includes(word)) folder.words.push(word);
            inp.value = '';
            renderManageList();
        };
    </script>
</body>
</html>
