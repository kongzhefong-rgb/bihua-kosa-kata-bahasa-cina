<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>笔画 & 生字练习</title>
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary-green: #4CAF50;
            --dark-green: #2E7D32;
            --bg-color: #F1F8E9;
            --grid-color: #ffcccc;
        }

        body {
            font-family: "Microsoft YaHei", sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            overflow-x: hidden;
        }

        .header {
            background: linear-gradient(135deg, var(--primary-green) 0%, var(--dark-green) 100%);
            color: white;
            width: 100%;
            padding: 30px 0 60px 0;
            text-align: center;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .card {
            background: white;
            width: 90%;
            max-width: 800px;
            margin: -30px auto 40px auto;
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            position: relative;
            z-index: 10;
        }

        /* 田字格样式 */
        .hanzi-grid {
            background-color: #fff;
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%;
            border: 3px solid #cc0000;
            position: relative;
            touch-action: none;
            margin: 0 auto;
        }

        .hanzi-grid::after {
            content: '';
            position: absolute;
            top: 50%; left: 0; right: 0;
            height: 1px; border-top: 1px dashed var(--grid-color);
        }
        .hanzi-grid::before {
            content: '';
            position: absolute;
            top: 0; bottom: 0; left: 50%;
            width: 1px; border-left: 1px dashed var(--grid-color);
        }

        .folder-btn.active {
            background-color: var(--primary-green);
            color: white;
            border-color: var(--dark-green);
        }

        .word-btn {
            transition: all 0.2s;
        }
        .word-btn:active { transform: scale(0.9); }
        
        /* 隐藏滚动条 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div class="header">
        <h1 class="text-3xl font-bold mb-1">笔画 & 生字练习</h1>
        <p class="opacity-90 text-sm">点一点生字，听读音，学笔顺</p>
    </div>

    <div class="card">
        <div class="flex items-center justify-between mb-6 bg-gray-50 p-4 rounded-2xl">
            <div class="flex items-center gap-3 flex-1">
                <span class="text-gray-600 font-bold text-sm">演示速度:</span>
                <input type="range" id="speedSlider" min="0.2" max="2.0" step="0.2" value="0.8" 
                    oninput="updateSpeedDisplay(this.value)" class="flex-1 accent-green-600">
                <span id="speedVal" class="text-green-700 font-bold w-12 text-center">0.8x</span>
            </div>
            <button onclick="window.openSettings()" class="ml-4 text-gray-400 text-sm">⚙️ 设置词库</button>
        </div>

        <div id="folderTabs" class="flex flex-wrap gap-2 mb-4 justify-center">
            </div>

        <div id="wordList" class="flex flex-wrap gap-3 mb-8 justify-center min-h-[50px] p-2 border-b border-dashed border-gray-100">
            </div>

        <div id="practiceArea" class="hidden">
            <div id="target" class="hanzi-grid w-[280px] h-[280px] md:w-[350px] md:h-[350px] rounded-xl shadow-lg"></div>
            
            <div class="text-center mt-6">
                <div id="statusText" class="text-green-700 font-bold mb-4 text-lg">点击生字开始练习</div>
                
                <div class="flex justify-center gap-4">
                    <button onclick="replayAnimation()" class="bg-blue-500 text-white px-6 py-3 rounded-xl font-bold shadow-md hover:bg-blue-600 flex items-center gap-2">
                        <span>👁️</span> 重看演示
                    </button>
                    <button onclick="startQuiz()" class="bg-orange-500 text-white px-6 py-3 rounded-xl font-bold shadow-md hover:bg-orange-600 flex items-center gap-2">
                        <span>✍️</span> 重新练习
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="settingsModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 items-center justify-center hidden p-4">
        <div class="bg-white w-full max-w-md rounded-3xl shadow-2xl flex flex-col max-h-[80vh]">
            <div class="bg-gray-800 p-4 text-white flex justify-between items-center rounded-t-3xl">
                <h2 class="font-bold">词库管理</h2>
                <button onclick="closeSettings()">✕</button>
            </div>
            <div class="p-6 overflow-y-auto">
                <div class="space-y-4">
                    <div class="flex gap-2">
                        <input type="text" id="newFolderName" placeholder="文件夹名(如: 第一课)" class="flex-1 border p-2 rounded-lg">
                        <button onclick="addFolder()" class="bg-green-600 text-white px-4 rounded-lg">添加</button>
                    </div>
                    <div id="folderManageList" class="space-y-4"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let writer = null;
        let currentSpeed = 0.8;
        let activeChar = '';
        let data = {
            folders: [
                { id: 1, name: '第一课', words: ['老', '师', '同', '学'] },
                { id: 2, name: '幼儿园', words: ['幼', '儿', '园'] }
            ]
        };

        // 初始化
        window.onload = () => {
            const saved = localStorage.getItem('hanzi_data');
            if (saved) data = JSON.parse(saved);
            renderFolders();
        };

        function updateSpeedDisplay(val) {
            currentSpeed = parseFloat(val);
            document.getElementById('speedVal').textContent = val + 'x';
            if (writer) {
                writer.updateColor('strokeAnimationSpeed', currentSpeed);
            }
        }

        function renderFolders() {
            const container = document.getElementById('folderTabs');
            container.innerHTML = '';
            data.folders.forEach(f => {
                const btn = document.createElement('button');
                btn.className = `folder-btn px-5 py-2 rounded-full border-2 border-green-100 font-bold text-green-800 transition-all hover:bg-green-50`;
                btn.textContent = f.name;
                btn.onclick = () => {
                    document.querySelectorAll('.folder-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderWords(f.words);
                };
                container.appendChild(btn);
            });
        }

        function renderWords(words) {
            const container = document.getElementById('wordList');
            container.innerHTML = '';
            words.forEach(w => {
                const btn = document.createElement('button');
                btn.className = 'word-btn w-12 h-12 bg-white border-2 border-orange-200 rounded-xl text-2xl font-black text-gray-800 shadow-sm flex items-center justify-center hover:border-orange-500';
                btn.textContent = w;
                btn.onclick = () => {
                    speak(w); // 播放读音
                    loadHanzi(w);
                };
                container.appendChild(btn);
            });
        }

        // 语音播放功能
        function speak(text) {
            if ('speechSynthesis' in window) {
                const msg = new SpeechSynthesisUtterance(text);
                msg.lang = 'zh-CN';
                msg.rate = 0.8; // 语速稍慢一点
                speechSynthesis.speak(msg);
            }
        }

        async function loadHanzi(char) {
            activeChar = char;
            document.getElementById('practiceArea').classList.remove('hidden');
            document.getElementById('target').innerHTML = '';
            
            writer = HanziWriter.create('target', char, {
                width: document.getElementById('target').offsetWidth,
                height: document.getElementById('target').offsetWidth,
                padding: 20,
                showOutline: true,
                strokeColor: '#2E7D32',
                drawingColor: '#E65100',
                drawingWidth: 20,
                strokeAnimationSpeed: currentSpeed,
                delayBetweenStrokes: 1000 / currentSpeed
            });

            replayAnimation();
        }

        async function replayAnimation() {
            if (!writer) return;
            writer.cancelQuiz();
            updateStatus("👀 正在演示笔顺...", "text-blue-600");
            writer.animateCharacter({
                onComplete: () => {
                    updateStatus("✍️ 请书写练习", "text-orange-600");
                    startQuiz();
                }
            });
        }

        function startQuiz() {
            if (!writer) return;
            writer.quiz({
                onCorrectStroke: () => updateStatus("✅ 太棒了，继续！", "text-green-600"),
                onMistake: () => updateStatus("❌ 笔顺不对，再试一次", "text-red-500"),
                onComplete: () => updateStatus("🌟 完成！你真棒！", "text-blue-700")
            });
        }

        function updateStatus(msg, color) {
            const el = document.getElementById('statusText');
            el.textContent = msg;
            el.className = `font-bold mb-4 text-lg ${color}`;
        }

        // 管理功能
        window.openSettings = () => {
            const p = prompt("请输入密码");
            if(p === "0925") {
                document.getElementById('settingsModal').style.display = 'flex';
                renderSettingsList();
            }
        };

        window.closeSettings = () => {
            document.getElementById('settingsModal').style.display = 'none';
            localStorage.setItem('hanzi_data', JSON.stringify(data));
            renderFolders();
        };

        function renderSettingsList() {
            const list = document.getElementById('folderManageList');
            list.innerHTML = '';
            data.folders.forEach(f => {
                const div = document.createElement('div');
                div.className = 'p-3 bg-gray-50 rounded-xl border';
                div.innerHTML = `
                    <div class="flex justify-between items-center mb-2">
                        <span class="font-bold">${f.name}</span>
                        <button onclick="deleteFolder(${f.id})" class="text-red-500 text-xs">删除</button>
                    </div>
                    <div class="flex gap-2">
                        <input type="text" id="inp-${f.id}" placeholder="输入生字" class="border rounded px-2 py-1 text-sm flex-1">
                        <button onclick="addWord(${f.id})" class="bg-blue-500 text-white px-2 rounded text-xs">加字</button>
                    </div>
                    <div class="mt-2 text-gray-500 text-sm">${f.words.join(', ')}</div>
                `;
                list.appendChild(div);
            });
        }

        window.addFolder = () => {
            const name = document.getElementById('newFolderName').value;
            if(!name) return;
            data.folders.push({ id: Date.now(), name, words: [] });
            document.getElementById('newFolderName').value = '';
            renderSettingsList();
        };

        window.deleteFolder = (id) => {
            data.folders = data.folders.filter(f => f.id !== id);
            renderSettingsList();
        };

        window.addWord = (id) => {
            const inp = document.getElementById(`inp-${id}`);
            const folder = data.folders.find(f => f.id === id);
            const chars = Array.from(inp.value).filter(c => /\p{Unified_Ideograph}/u.test(c));
            folder.words = [...new Set([...folder.words, ...chars])];
            inp.value = '';
            renderSettingsList();
        };
    </script>
</body>
</html>
