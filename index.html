<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>笔画 & 生字练习</title>
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
    <style>
        :root {
            --primary-green: #4CAF50;
            --soft-yellow: #FFF9C4;
            --bg-color: #F1F8E9;
        }
        body {
            font-family: "Microsoft YaHei", sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            background: linear-gradient(135deg, #4CAF50 0%, #2E7D32 100%);
            color: white;
            width: 100%;
            padding: 30px 0;
            text-align: center;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .card {
            background: white;
            width: 90%;
            max-width: 600px;
            margin: -20px 20px 20px 20px;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }
        .input-box { display: flex; gap: 10px; margin-bottom: 25px; }
        input {
            flex: 1;
            border: 3px solid #C8E6C9;
            border-radius: 15px;
            padding: 12px;
            font-size: 1.1rem;
            outline: none;
        }
        button#generateBtn {
            background-color: #FF9800;
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
        }
        #charButtons {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-bottom: 25px;
        }
        .char-item {
            width: 60px;
            height: 60px;
            background-color: white;
            border: 3px solid #FFCC80;
            border-radius: 12px;
            font-size: 28px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 0 #FFB74D;
        }
        .char-item.active {
            background-color: var(--primary-green);
            color: white;
            border-color: #FFEB3B;
        }
        .canvas-area {
            display: none;
            flex-direction: column;
            align-items: center;
            border: 4px dashed #A5D6A7;
            border-radius: 20px;
            padding: 20px;
            background-color: #fff;
        }
        #target {
            width: 300px;
            height: 300px;
            background-image: 
                linear-gradient(to right, #eee 1px, transparent 1px),
                linear-gradient(to bottom, #eee 1px, transparent 1px);
            background-size: 50% 50%; /* 簡易田字格 */
            border: 2px solid #333;
        }
        .msg { margin-top: 15px; font-size: 1.3rem; color: #2E7D32; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h1>笔画 & 生字练习</h1>
        <p>听发音、看笔顺、动手写</p>
    </div>

    <div class="card">
        <div class="input-box">
            <input type="text" id="charInput" placeholder="请输入想要练习的简态字...">
            <button id="generateBtn">生成字卡</button>
        </div>
        <div id="charButtons"></div>
        <div class="canvas-area" id="canvasArea">
            <div id="target"></div>
            <div class="msg" id="msg">准备开始</div>
        </div>
    </div>

    <script>
        let writer;
        // 筆畫代碼對應名稱 (Hanzi Writer 數據格式)
        const strokeNames = {
            'h': '横', 's': '竖', 'p': '撇', 'n': '捺', 'd': '点', 't': '提',
            'hz': '横折', 'sz': '竖折', 'hg': '横钩', 'sg': '竖钩', 'swg': '竖弯钩'
        };

        document.getElementById('generateBtn').addEventListener('click', function() {
            const val = document.getElementById('charInput').value;
            const container = document.getElementById('charButtons');
            container.innerHTML = '';
            document.getElementById('canvasArea').style.display = 'none';
            
            Array.from(val).forEach(char => {
                if(char.trim()==='') return;
                const btn = document.createElement('div');
                btn.className = 'char-item';
                btn.textContent = char;
                btn.onclick = () => runFlow(char, btn);
                container.appendChild(btn);
            });
        });

        async function runFlow(char, el) {
            document.querySelectorAll('.char-item').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('canvasArea').style.display = 'flex';
            document.getElementById('target').innerHTML = '';
            const msg = document.getElementById('msg');

            writer = HanziWriter.create('target', char, {
                width: 300, height: 300, padding: 10,
                showOutline: true, strokeColor: '#2E7D32', drawingColor: '#D32F2F', drawingWidth: 12
            });

            // 1. 讀生字
            msg.textContent = `🔊 读音：${char}`;
            await speak(char);

            // 2. 播放動畫 + 讀筆畫名
            msg.textContent = `👀 观察笔画...`;
            const data = await HanziWriter.loadCharacterData(char);
            for (let i = 0; i < data.strokes.length; i++) {
                // 這裡我們抓取該筆劃的初步特徵來對應名稱
                // 註：精確辨識所有複合筆劃需較深邏輯，這裡示範讀出基本筆劃
                await speak("第" + (i+1) + "笔"); 
                await new Promise(r => writer.animateStroke(i, { onComplete: r }));
            }

            // 3. 直接開始練習
            msg.textContent = `✍️ 请你写一遍`;
            writer.quiz({
                onCorrectStroke: (s) => {
                    speak("对！第" + (s.strokeNum + 1) + "笔");
                },
                onComplete: () => {
                    msg.textContent = "🌟 太棒了！写完了！";
                    speak("太棒了，你学会了" + char);
                }
            });
        }

        function speak(text) {
            return new Promise(resolve => {
                const u = new SpeechSynthesisUtterance(text);
                u.lang = 'zh-CN';
                u.rate = 0.9;
                u.onend = resolve;
                window.speechSynthesis.speak(u);
            });
        }
    </script>
</body>
</html>
